# Model catalog — the single source of truth for what each model IS (F-010, D-016).
#
# One entry per CANONICAL model id (provider-neutral: never a runtime/provider prefix).
# Runtime adapters translate a canonical id into the exact string a runtime wants
# (e.g. opencode-go/minimax-m3, minimax/MiniMax-M3, openrouter/anthropic/claude-opus-4.8,
# or the Claude alias `opus`) via `RuntimeAdapter.model_string()`.
#
# Fields:
#   provider        canonical home provider (anthropic, openai, google, deepseek, minimax, ...)
#   family          model family for grouping
#   context_window  tokens — OBJECTIVE, refreshed from `opencode models --verbose` / models.dev
#   scores          per-capability 1-10 (SEED, low trust) — refined by tracing (Phase 4/5)
#   cost_tier       cheap | standard | deep | frontier
#   pricing         approx USD per 1M tokens {in, out} — OBJECTIVE, refreshed from detection
#   limits          hard ceilings; max_task_complexity ∈ {low, medium, high} (high = no ceiling)
#   confidence      low | medium | high — honesty of the seed scores/pricing for this row
#
# Seed source: .aspis/research/model-capability-seed.md. DO NOT trust exact numbers — they
# exist so routing ships populated; objective fields come from detection, scores from tracing.

models:
  claude-opus-4-8:
    provider: anthropic
    family: claude
    context_window: 1000000
    scores: {planning: 10, implementation: 10, review: 10, reasoning: 10}
    cost_tier: frontier
    pricing: {in: 5.00, out: 25.00}
    limits: {max_task_complexity: high}
    confidence: medium

