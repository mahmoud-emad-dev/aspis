# Tier routing — runtime + tier -> model the runtime can run (F-010).
#
# Agents declare a tier (cheap / standard / deep); this maps the tier to a model.
# A value may be a provider-qualified `provider/model` (used as-is) or a canonical
# id that the adapter resolves to a connected provider via `model_string()`.
# This is the global default; a project overrides a tier or pins an agent in
# `.aspis/config/models.yaml` / `agent-models.yaml` without touching code.

# OpenCode defaults to the FREE OpenCode Zen models — available to every opencode
# user out of the box, so a fresh install renders agents that actually run, for free.
# Override with your own plan, e.g. `opencode-go/deepseek-v4-pro`, per project.
# Other free Zen models you can assign: opencode/big-pickle, opencode/mimo-v2.5-free,
# opencode/north-mini-code-free.
opencode:
  cheap: opencode/deepseek-v4-flash-free
  standard: opencode/deepseek-v4-flash-free
  deep: opencode/nemotron-3-ultra-free

claude:
  cheap: claude-haiku-4-5
  standard: claude-sonnet-4-6
  deep: claude-opus-4-8
