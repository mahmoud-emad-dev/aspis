# Each agent's primary capability — what kind of work it mainly does (F-010).
#
# This is the seam that makes routing capability-aware instead of one-model-per-tier:
# `aspis models --sync` reads it with `capabilities.yaml` (capability -> score dimension +
# cost budget) and `model_catalog.yaml` (per-model scores) to auto-pick the best AVAILABLE
# model for each agent's job. The agent still declares a tier (its cost budget); the
# capability decides which score dimension ranks the candidates. Edit to re-classify an
# agent; the picks refresh on the next sync.

agents:
  project-lead:     orchestration
  planning-lead:    planning
  build-lead:       orchestration
  general-builder:  implementation
  reviewer:         review
  research-lead:    research
  fix-lead:         debugging
  test-lead:        testing
  system-lead:      implementation
  committer:        documentation
  project-explorer: exploration
