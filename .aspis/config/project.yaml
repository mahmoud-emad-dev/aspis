# This project's settings — build mode and model routing.
#
# Model routing is fully flexible and lives in DATA (no code change). The default is the
# tier map in `config/models.yaml`; everything below overrides it. Precedence, high -> low:
#
#   runtimes.<runtime>.agents.<name>   # one agent, one runtime — the most specific
#   agents.<name>                      # one agent, every runtime
#   runtimes.<runtime>.models.<tier>   # a tier, one runtime
#   models.<runtime>.<tier>            # (same, flat form)
#   config/models.yaml                 # the global tier map
#
# A value may be a TIER (cheap / standard / deep) or a concrete model id — a canonical
# catalog id (deepseek-v4-pro, minimax-m3, glm-5.1) or a runtime-native one (Claude alias
# opus/sonnet/haiku). Detection translates a canonical id to the connected provider's
# exact string (e.g. deepseek-v4-pro -> opencode-go/deepseek-v4-pro). Run `aspis models`
# to see how every tier resolves on this machine.

mode: production

# Per-(runtime, agent) routing — the same agent can use a different model per runtime.
runtimes:
  claude:
    agents:
      # Claude: plan & review on Opus (deep, the default), build on Sonnet, Haiku only for
      # small/mechanical work (committer, explorer). The sub-builder moves off Haiku:
      general-builder: sonnet
      # build-lead stays deep -> opus ("or Opus as lead builder").
  opencode:
    agents: {}
      # OpenCode (Go plan): the models.yaml tier map already routes leads/reasoning to
      # deepseek-v4-pro, the sub-builder + committer to deepseek-v4-flash, standard to
      # minimax-m3. Pin any agent to a specific model here, e.g.:
      #   reviewer: glm-5.1          # a particular model for review
      #   general-builder: minimax-m3  # e.g. a UI-heavy builder
      #   test-lead: deepseek-v4-flash
