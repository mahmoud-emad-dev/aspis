name: Bug report
description: Something in ASPIS behaved incorrectly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please run `aspis doctor` and paste the output below — it tells us most of what we need.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. ran `aspis ...`
        2. expected ...
        3. got ...
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`aspis doctor` output"
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ASPIS version
      description: Output of `aspis --version`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, Linux, macOS, WSL]
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options: [Claude Code, OpenCode, Neither / N/A]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
