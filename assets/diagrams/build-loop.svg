<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" font-family="Inter, 'Segoe UI', system-ui, sans-serif" role="img" aria-label="The ASPIS build loop: plan, build, review, test">
  <defs>
    <marker id="bl-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4F46E5"/>
    </marker>
  </defs>
  <text x="24" y="34" font-size="15" font-weight="700" fill="#0F172A">The build loop</text>
  <text x="24" y="54" font-size="13" fill="#64748B">Every step is gated (ruff · pytest) and checked by a different agent than the one that built it.</text>
  <g font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">
    <rect x="24"  y="84" width="160" height="64" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5"/>
    <text x="104" y="121">Plan</text>
    <rect x="240" y="84" width="160" height="64" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5"/>
    <text x="320" y="121">Build</text>
    <rect x="456" y="84" width="160" height="64" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5"/>
    <text x="536" y="121">Review</text>
    <rect x="672" y="84" width="124" height="64" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5"/>
    <text x="734" y="121">Test</text>
  </g>
  <g stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#bl-arrow)">
    <line x1="186" y1="116" x2="238" y2="116"/>
    <line x1="402" y1="116" x2="454" y2="116"/>
    <line x1="618" y1="116" x2="670" y2="116"/>
  </g>
  <g font-size="12" fill="#64748B" text-anchor="middle">
    <text x="212" y="108">SPEC</text>
    <text x="428" y="108">gate</text>
    <text x="644" y="108">gate</text>
  </g>
  <path d="M734 148 V178 H104 V150" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#bl-arrow)"/>
  <text x="419" y="198" font-size="12" fill="#64748B" text-anchor="middle">next task — state carried in .aspis/ (Git), readable by any runtime</text>
</svg>
