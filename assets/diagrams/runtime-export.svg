<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" font-family="Inter, 'Segoe UI', system-ui, sans-serif" role="img" aria-label="One runtime-neutral catalog compiles into per-runtime configs">
  <defs>
    <marker id="rx-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4F46E5"/>
    </marker>
  </defs>
  <text x="24" y="34" font-size="15" font-weight="700" fill="#0F172A">One source, many runtimes</text>
  <text x="24" y="54" font-size="13" fill="#64748B">Add a runtime by adding an adapter; add an asset by adding a file. No duplicated truth to drift.</text>

  <rect x="24" y="88" width="200" height="96" rx="10" fill="#0F172A"/>
  <text x="124" y="130" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Catalog</text>
  <text x="124" y="152" font-size="12" fill="#CBD5E1" text-anchor="middle">runtime-neutral</text>
  <text x="124" y="170" font-size="12" fill="#CBD5E1" text-anchor="middle">agents · skills · commands</text>

  <rect x="330" y="100" width="150" height="72" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="405" y="132" font-size="14" font-weight="700" fill="#4F46E5" text-anchor="middle">adapters</text>
  <text x="405" y="152" font-size="12" fill="#64748B" text-anchor="middle">render per runtime</text>

  <g font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">
    <rect x="596" y="78" width="200" height="56" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5"/>
    <text x="696" y="112">.claude/</text>
    <rect x="596" y="146" width="200" height="56" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5"/>
    <text x="696" y="180">.opencode/</text>
  </g>

  <g stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#rx-arrow)">
    <line x1="226" y1="136" x2="328" y2="136"/>
    <line x1="482" y1="130" x2="594" y2="106"/>
    <line x1="482" y1="142" x2="594" y2="174"/>
  </g>
</svg>
