# Tier routing — runtime + tier -> CANONICAL model id (F-010).
#
# Agents declare a tier (cheap / standard / deep); this maps the tier to a canonical
# model id defined in `model_catalog.yaml`. The runtime adapter then translates that
# canonical id into the exact string the runtime/provider wants (see model_string()):
#   claude    canonical claude-opus-4-8 -> alias `opus`
#   opencode  canonical minimax-m3      -> e.g. `opencode-go/minimax-m3`
# This is the global default; a project overrides a tier or pins an agent in
# `.aspis/config/project.yaml` without touching code. Values MUST be catalog ids.

opencode:
  cheap: deepseek-v4-flash
  standard: minimax-m3
  deep: deepseek-v4-pro

claude:
  cheap: claude-haiku-4-5
  standard: claude-sonnet-4-6
  deep: claude-opus-4-8
