# Commit-message convention — the single source for ASPIS commit style.
#
# This is DATA the git subsystem (F-007) consumes today: `aspis commit` builds the
# message with scripts/git/compose.py, and the commit-msg hook enforces it through
# commitmsg.validate. Machine-enforced keys: `types`, `subject.max_length`,
# `forbid_attribution`, `attribution_models`. The rest (`scope` shape, `body`,
# `branch`, `subject.pattern`/`imperative`) are the documented convention every
# agent and human follows but no code checks — history is scanned later for project
# history, so it must read as if a careful human wrote it.

# Allowed commit types (the title prefix).
types: [feat, fix, refactor, docs, chore, test, style, perf]

# Scope — the feature id when the commit belongs to a feature; optionally a task,
# or a task SPAN when one commit covers several tasks. Never label a multi-task
# commit with only the first task. Scope is OMITTED for repo-lifecycle commits that
# belong to no feature (init / bootstrap / release).
scope:
  feature: "F-NNN"          # the feature id, e.g. F-005
  task: "T-NN"              # one planned task, e.g. T-02
  task_span: "T-NN..T-MM"   # a commit covering several tasks, e.g. T-01..T-05
  plan_task: "T-00"         # the plan / scaffold commit
  optional: true            # omit for non-feature lifecycle commits
  examples:
    - "feat(F-005/T-01..T-05): asset kinds as data + capability model"
    - "docs(F-005/T-00): plan extensibility core"
    - "fix(F-003): doctor path resolution"
    - "chore: initialize ASPIS project"

# Title. Only `max_length` is machine-enforced; `pattern`/`imperative` are advisory.
subject:
  pattern: "<type>[(F-NNN[/T-NN | /T-NN..T-MM])]: <imperative title>"
  max_length: 72
  imperative: true

# Body — advisory (documented convention, not machine-checked).
body:
  require: true
  bullets: "2-10 real change/notes lines (~5 typical); only what a human would record; no filler"
  tasks_trailer: "for a multi-task commit, end with a 'Tasks: T-NN, ...' (or T-NN..T-MM) line"

# Branch naming — advisory (kept here so the whole git convention has one home).
branch: "<type>/F-NNN-<short-slug>"

# History must read as human-authored — never any AI / model / tool attribution.
# Phrases below are always forbidden (substring match): unambiguous attribution.
forbid_attribution:
  - "co-authored-by"
  - "generated with"
  - "generated by ai"
  - "written by ai"
  - "ai-generated"
  - "🤖"
# Model / tool names are forbidden only in an attribution *context* (e.g. "by claude",
# "claude-generated"), so the bare runtime directories `.claude` / `.opencode` stay
# valid domain vocabulary in a commit message.
attribution_models:
  - "claude"
  - "opus"
  - "sonnet"
  - "haiku"
  - "anthropic"
  - "gpt"
  - "openai"
  - "copilot"
  - "gemini"
  - "llama"

# Auto-fix policy (F-012) — non-blocking repairs the commit-msg hook applies BEFORE
# validating, so an unambiguous violation is fixed and the commit still proceeds
# (never blocks the developer). Each true key enables that repair; set false to fall
# back to a warning only. Data, not code — adding a repair is editing this block.
autofix:
  attribution: true   # strip forbidden-attribution lines, keeping history human-authored

# Escape hatch (F-012) — a commit whose message carries this trailer *on its own line*
# bypasses the convention checks for that one commit (rare; the hook removes the trailer
# and logs it). A mere mention of the text in the body does not trigger it.
skip_marker: "Commit-Style: skip"
