# The shared base profile that every project inherits.
#
# The base set ships the universal entry point — the Project Lead — and the
# skills it cannot operate without. Specialist leads are added by their own
# profiles as the catalog grows.
name: base
runtimes:
  - opencode
agents:
  - agents/project-lead.md
  - agents/system-lead.md
  - agents/project-explorer.md
skills:
  - skills/project-awareness
  - skills/request-classification
  - skills/lead-routing
  - skills/context-packaging
  - skills/project-question-answering
  - skills/project-guidance
  - skills/system-awareness
  - skills/deterministic-first
  - skills/asset-authoring
  - skills/system-validation
commands: []
templates: []
hooks: []
scripts: []
