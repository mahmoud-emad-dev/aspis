# Runtime definition — Claude Code. See opencode.yaml for the schema.
name: claude
detect:
  exe: claude
run: claude
# Headless one-shot invocation template (for running an agent from the CLI, no TUI).
# Placeholders: {prompt} {agent} {model}. Used by the future CLI-bootstrap headless path.
headless: 'claude -p "{prompt}" --agent {agent} --model {model} --permission-mode acceptEdits --output-format text'
dir: .claude
root_guide: CLAUDE.md # Claude ships its own root guide alongside AGENTS.md
capabilities:
  mode: false # Claude expresses access via tools, not a `mode` field → not promoted
  subagents: true # implicit subagent access
  subagent_depth: 2
  exportable: true
